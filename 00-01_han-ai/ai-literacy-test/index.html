<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIツール理解度テスト - ざつね屋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="brand">生成AI活用支援のざつね<span>屋</span></div>

    <!-- ウェルカム -->
    <div id="screen-welcome" class="screen active">
      <div class="hero">
        <div class="hero-icon"><svg viewBox="0 0 24 24"><path d="M9.5 4.2A3 3 0 0 0 5 6.8a3 3 0 0 0-1.4 4A3 3 0 0 0 5 15.6a3 3 0 0 0 4.5 2.6V4.2z"/><path d="M14.5 4.2A3 3 0 0 1 19 6.8a3 3 0 0 1 1.4 4 3 3 0 0 1-1.4 4.8 3 3 0 0 1-4.5 2.6V4.2z"/><path d="M9.5 9.2H12M14.5 12.5H12M12 4.2v14"/></svg></div>
        <h1>AIツール理解度テスト</h1>
        <p class="hero-sub">20問・約3分で、あなたのAI活用スキルを5軸で診断します</p>
        <div class="hero-meta">
          <span><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2.5"/><path d="M9 3.5h6v2.6H9z"/><path d="M8.5 10.5h7"/><path d="M8.5 14h7"/><path d="M8.5 17.5h4"/></svg>20問</span>
          <span><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></svg>約3分</span>
          <span><svg viewBox="0 0 24 24"><path d="M4 12.5V5.6A1.6 1.6 0 0 1 5.6 4h6.9l7.4 7.4a1.6 1.6 0 0 1 0 2.2l-6.1 6.1a1.6 1.6 0 0 1-2.2 0L4 12.5z"/><circle cx="8.6" cy="8.6" r="1.3"/></svg>無料</span>
        </div>
      </div>
      <div class="axis-tags">
        <span class="axis-tag">AI基礎知識</span>
        <span class="axis-tag">ツール操作</span>
        <span class="axis-tag">プロンプト力</span>
        <span class="axis-tag">セキュリティ・倫理</span>
        <span class="axis-tag">業務応用</span>
      </div>
      <button class="btn-primary btn-large" id="btn-start">テストを始める →</button>
    </div>

    <!-- クイズ -->
    <div id="screen-quiz" class="screen">
      <div class="progress-wrap">
        <div class="progress-labels">
          <span id="axis-label" class="axis-label"></span>
          <span id="q-counter" class="q-counter"></span>
        </div>
        <div class="progress-bg">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <div class="question-card">
        <p class="question-text" id="question-text"></p>
        <div class="options" id="options"></div>
      </div>
      <div class="nav-btns">
        <button class="btn-secondary" id="btn-back">← 戻る</button>
        <button class="btn-primary" id="btn-next" disabled>次へ →</button>
      </div>
    </div>

    <!-- 結果 -->
    <div id="screen-results" class="screen">
      <h2 class="result-heading">テスト結果</h2>
      <div class="total-score-wrap">
        <span class="total-score-num" id="total-score"></span>
        <span class="total-score-unit">/ 100点</span>
      </div>
      <div class="radar-wrap">
        <canvas id="radar-canvas"></canvas>
      </div>
      <div class="axis-scores" id="axis-scores"></div>
      <div class="recommendation" id="recommendation"></div>
      <div class="result-actions">
        <a href="https://zatune-gif.github.io/zatuneya-hp/services.html" class="btn-secondary link-btn">サービス詳細を見る</a>
        <button class="btn-primary" id="btn-retry">もう一度受ける</button>
      </div>
    </div>

    <div class="footer">
      <div class="footer-links">
        <a href="https://zatune-gif.github.io/zatuneya-hp/">トップページ</a>
        <a href="https://zatune-gif.github.io/kurashi-no-dodai-log/00-01_han-ai/13_ai-diagnosis-tool/prices.html">料金案内</a>
        <a href="https://zatune-gif.github.io/kurashi-no-dodai-log/00-01_han-ai/13_ai-diagnosis-tool/diagnosis-simple.html">無料診断</a>
        <a href="https://zatune-gif.github.io/kurashi-no-dodai-log/00-01_han-ai/13_ai-diagnosis-tool/request.html">資料請求</a>
      </div>
      © 2026 ざつね屋
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
