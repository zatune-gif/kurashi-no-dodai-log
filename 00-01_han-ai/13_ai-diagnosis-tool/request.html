<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料請求 - ざつね屋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="detail.css">
</head>
<body>
  <div class="container">
    <div class="brand">生成AI活用支援のざつね<span>屋</span></div>

    <!-- 入力フォーム -->
    <div id="screen-form" class="screen active">
      <div class="welcome-hero">
        <div class="welcome-icon"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2.5"/><path d="M9 3.5h6v2.6H9z"/><path d="M8.5 10.5h7"/><path d="M8.5 14h7"/><path d="M8.5 17.5h4"/></svg></div>
        <h1>資料請求</h1>
        <p class="welcome-sub">ざつね屋のサービス資料をお送りします。<br>下記フォームに必要事項を入力してください。</p>
      </div>

      <div class="section-card info-form">
        <div class="section-header header-primary">
          <span class="section-icon"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2.5"/><path d="M9 3.5h6v2.6H9z"/><path d="M8.5 10.5h7"/><path d="M8.5 14h7"/><path d="M8.5 17.5h4"/></svg></span>
          <span>基本情報</span>
        </div>
        <div class="form-group">
          <label for="company-name">会社名 <span class="required">必須</span></label>
          <input type="text" id="company-name" placeholder="例：株式会社〇〇" autocomplete="organization">
        </div>
        <div class="form-group">
          <label for="contact-name">担当者名 <span class="required">必須</span></label>
          <input type="text" id="contact-name" placeholder="例：山田 太郎" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="contact-email">メールアドレス <span class="required">必須</span></label>
          <input type="email" id="contact-email" placeholder="例：taro@example.com" autocomplete="email">
        </div>
        <div class="hp-field" aria-hidden="true">
          <label for="hp-website">ウェブサイト</label>
          <input type="text" id="hp-website" name="website" tabindex="-1" autocomplete="off">
        </div>
        <p id="form-error-msg" class="form-error-msg hidden">
          <svg viewBox="0 0 24 24"><path d="M12 4l9 15.5H3L12 4z"/><path d="M12 10v4"/><circle cx="12" cy="17" r=".7" fill="currentColor" stroke="none"/></svg>
          未入力または形式が正しくない項目があります
        </p>
      </div>

      <button class="btn-primary btn-large" id="btn-next">次へ →</button>
    </div>

    <!-- 詳細診断の案内 -->
    <div id="screen-choice" class="screen">
      <div class="section-card">
        <div class="section-header header-primary">
          <span class="section-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="M20 20l-4.3-4.3"/></svg></span>
          <span>詳細診断のご案内</span>
        </div>
        <p class="library-intro">
          詳細診断（約7分）を受けると、貴社の業種・業務に合わせた<strong>プロンプトライブラリ</strong>と<strong>最適サービスのご提案</strong>を無料でご確認いただけます。
        </p>
        <p class="card-body">詳細診断を受けますか？</p>
      </div>

      <div class="result-actions">
        <button class="btn-primary btn-large" id="btn-do-diagnosis">詳細診断を受ける（おすすめ）</button>
        <button class="btn-secondary" id="btn-skip-diagnosis">診断は受けずに資料請求のみ</button>
        <button class="btn-secondary" id="btn-back-to-form">← 戻る</button>
      </div>
    </div>

    <!-- サンクス（診断なし） -->
    <div id="screen-thanks" class="screen">
      <div class="section-card">
        <div class="section-header header-primary">
          <span class="section-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M8.4 12.2l2.5 2.4 4.7-5"/></svg></span>
          <span>資料請求を受け付けました</span>
        </div>
        <p class="card-body">
          ご連絡ありがとうございます。<br>
          2営業日以内にご登録のメールアドレスへ資料をお送りします。
        </p>
      </div>
      <a href="./diagnosis-simple.html" class="btn-secondary link-btn">トップへ戻る</a>
    </div>

    <div class="footer">© 2026 ざつね屋</div>
  </div>

  <script src="utils.js"></script>
  <script src="request.js"></script>
</body>
</html>
