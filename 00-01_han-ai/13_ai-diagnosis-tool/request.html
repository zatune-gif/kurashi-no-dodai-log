<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料請求 - ざつね屋</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="detail.css">
</head>
<body>
  <div class="container">
    <div class="brand">ざつね屋</div>

    <!-- 入力フォーム -->
    <div id="screen-form" class="screen active">
      <div class="welcome-hero">
        <div class="welcome-icon">📋</div>
        <h1>資料請求</h1>
        <p class="welcome-sub">ざつね屋のサービス資料をお送りします。<br>下記フォームに必要事項を入力してください。</p>
      </div>

      <div class="section-card info-form">
        <div class="section-header header-primary">
          <span class="section-icon">📋</span>
          <span>基本情報</span>
        </div>
        <div class="form-group">
          <label for="company-name">会社名 <span class="required">必須</span></label>
          <input type="text" id="company-name" placeholder="例：株式会社〇〇" autocomplete="organization">
        </div>
        <div class="form-group">
          <label for="contact-name">担当者名 <span class="required">必須</span></label>
          <input type="text" id="contact-name" placeholder="例：山田 太郎" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="contact-email">メールアドレス <span class="required">必須</span></label>
          <input type="email" id="contact-email" placeholder="例：taro@example.com" autocomplete="email">
        </div>
        <p id="form-error-msg" class="form-error-msg hidden">
          ⚠ 未入力または形式が正しくない項目があります
        </p>
      </div>

      <button class="btn-primary btn-large" id="btn-next">次へ →</button>
    </div>

    <!-- 詳細診断の案内 -->
    <div id="screen-choice" class="screen">
      <div class="section-card">
        <div class="section-header header-primary">
          <span class="section-icon">🔍</span>
          <span>詳細診断のご案内</span>
        </div>
        <p class="library-intro">
          詳細診断（約7分）を受けると、貴社の業種・業務に合わせた<strong>プロンプトライブラリ</strong>と<strong>最適サービスのご提案</strong>を無料でご確認いただけます。
        </p>
        <p class="card-body">詳細診断を受けますか？</p>
      </div>

      <div class="result-actions">
        <button class="btn-primary btn-large" id="btn-do-diagnosis">詳細診断を受ける（おすすめ）</button>
        <button class="btn-secondary" id="btn-skip-diagnosis">診断は受けずに資料請求のみ</button>
        <button class="btn-secondary" id="btn-back-to-form">← 戻る</button>
      </div>
    </div>

    <!-- サンクス（診断なし） -->
    <div id="screen-thanks" class="screen">
      <div class="section-card">
        <div class="section-header header-primary">
          <span class="section-icon">✅</span>
          <span>資料請求を受け付けました</span>
        </div>
        <p class="card-body">
          ご連絡ありがとうございます。<br>
          2営業日以内にご登録のメールアドレスへ資料をお送りします。
        </p>
      </div>
      <a href="./index.html" class="btn-secondary link-btn">トップへ戻る</a>
    </div>

    <div class="footer">© 2026 ざつね屋</div>
  </div>

  <script src="utils.js"></script>
  <script src="request.js"></script>
</body>
</html>
