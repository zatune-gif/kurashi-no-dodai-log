<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ざつね屋 プロンプトライブラリ</title>
<style>
:root{
  --bg:#1C1C1C; --card:#242424; --card2:#2C2C2C;
  --accent:#DA7756; --accent-d:#C5644A;
  --text:#E8E8E8; --sub:#999; --line:#333;
  --teal:#5BBDC8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;font-size:15px;line-height:1.8;min-height:100vh}

/* ヘッダー */
.site-header{background:#141414;border-bottom:1px solid var(--line);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.site-header h1{font-size:17px;font-weight:900;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.site-header h1 span{color:var(--accent)}
@media (max-width:480px){
  .site-header{height:auto;flex-wrap:wrap;padding:10px 14px;gap:6px 10px}
  .site-header h1{font-size:13px;white-space:normal;overflow:visible;text-overflow:clip;flex:1 1 100%}
  .site-header h1 .brand-lead{display:none}
  .print-btn{padding:6px 12px;font-size:11.5px}
}
.print-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font:700 13px/1 'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;cursor:pointer;transition:background .15s}
.print-btn:hover{background:var(--accent-d)}

/* フィルターバー */
.filter-bar{background:#1A1A1A;border-bottom:1px solid var(--line);padding:16px 24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.filter-group{display:flex;align-items:center;gap:8px}
.filter-group label{font-size:12px;color:var(--sub);white-space:nowrap;font-weight:700;letter-spacing:.06em}
.filter-group select{background:#2A2A2A;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;outline:none}
.filter-group select:focus{border-color:var(--accent)}
.search-wrap{flex:1;min-width:180px}
.search-wrap input{width:100%;background:#2A2A2A;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.count-badge{font-size:12px;color:var(--sub);white-space:nowrap;margin-left:auto}

/* メインコンテンツ */
.main{padding:28px 24px;max-width:1160px;margin:0 auto}

/* カードグリッド */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:12px;transition:border-color .18s,transform .18s}
.card:hover{border-color:#555;transform:translateY(-2px)}
.card-meta{display:flex;flex-wrap:wrap;gap:7px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.03em;white-space:nowrap}
.badge-task{background:#3A2A22;color:#DA7756}
.badge-tool{background:#1E2F33;color:#5BBDC8}
.badge-level{background:#2A2A2A;color:#999}
.badge-level.easy{background:#1E2E1E;color:#5CB85C}
.card-title{font-size:14.5px;font-weight:700;color:#F0F0F0;line-height:1.5}
.prompt-box{position:relative;background:var(--card2);border-radius:10px;padding:14px 14px 40px}
.prompt-text{font-size:13px;line-height:1.8;color:#CCC;white-space:pre-wrap;word-break:break-all}
.copy-btn{position:absolute;bottom:10px;right:10px;background:#3A3A3A;color:var(--text);border:none;border-radius:7px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.copy-btn:hover{background:#505050}
.copy-btn.copied{background:var(--accent);color:#fff}
.placeholder-hint{font-size:11.5px;color:var(--sub)}
.placeholder-hint strong{color:#DA7756}
.source-tag{font-size:11px;color:var(--sub)}
.no-results{text-align:center;color:var(--sub);padding:64px 0}
.no-results p{font-size:15px}

/* 印刷用 */
@media print{
  .site-header,.filter-bar,.print-btn{display:none!important}
  .card-grid{grid-template-columns:1fr 1fr}
  .card{page-break-inside:avoid}
  body{background:#fff;color:#1a1a1a}
  .card{background:#fff;border:1px solid #ddd}
  .prompt-box{background:#f8f8f8}
  .badge-task{background:#FFE8DF;color:#C5644A}
  .badge-tool{background:#DCF0F2;color:#3A9BAA}
  .prompt-text,.card-title{color:#1a1a1a}
  .copy-btn{display:none}
}

/* フッター */
.site-footer{text-align:center;padding:28px;color:var(--sub);font-size:12px;border-top:1px solid var(--line);margin-top:48px}
</style>
</head>
<body>

<header class="site-header">
  <h1><span class="brand-lead">生成AI活用支援の</span>ざつね<span>屋</span> プロンプトライブラリ</h1>
  <button class="print-btn" onclick="window.print()">この結果を印刷</button>
</header>

<div class="filter-bar">
  <div class="filter-group">
    <label>用途：</label>
    <select id="filter-task">
      <option value="">すべて</option>
    </select>
  </div>
  <div class="filter-group">
    <label>ツール：</label>
    <select id="filter-tool">
      <option value="">すべて</option>
    </select>
  </div>
  <div class="filter-group">
    <label>コース：</label>
    <select id="filter-source">
      <option value="">すべて</option>
    </select>
  </div>
  <div class="filter-group search-wrap">
    <input type="text" id="search" placeholder="キーワードで検索...">
  </div>
  <span class="count-badge" id="count-badge"></span>
</div>

<main class="main">
  <div class="card-grid" id="card-grid"></div>
  <div class="no-results" id="no-results" style="display:none">
    <p>条件に合うプロンプトがありません。</p>
  </div>
</main>

<footer class="site-footer">© 2026 ざつね屋</footer>

<script>
let prompts = [];

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCards(list) {
  const grid = document.getElementById('card-grid');
  const noRes = document.getElementById('no-results');
  const badge = document.getElementById('count-badge');

  if (!list.length) {
    grid.innerHTML = '';
    noRes.style.display = '';
    badge.textContent = '0件';
    return;
  }
  noRes.style.display = 'none';
  badge.textContent = `${list.length}件`;

  grid.innerHTML = list.map(p => {
    const tools = p.tools.map(t => `<span class="badge badge-tool">ツール：${escHtml(t)}</span>`).join('');
    const levelClass = p.level === 'そのまま使える' ? 'easy' : '';
    const ph = p.placeholders.length
      ? `<p class="placeholder-hint"><strong>[ ] に入れる内容：</strong>${p.placeholders.map(x => `「${escHtml(x)}」`).join('、')}</p>`
      : '';
    return `<div class="card">
  <div class="card-meta">
    <span class="badge badge-task">用途：${escHtml(p.task)}</span>
    ${tools}
    <span class="badge badge-level ${levelClass}">${escHtml(p.level)}</span>
  </div>
  <p class="card-title">${escHtml(p.title)}</p>
  <div class="prompt-box">
    <p class="prompt-text">${escHtml(p.prompt)}</p>
    <button class="copy-btn" data-id="${escHtml(p.id)}">コピー</button>
  </div>
  ${ph}
  <span class="source-tag">出典：${escHtml(p.source)}</span>
</div>`;
  }).join('');
}

function getFiltered() {
  const task   = document.getElementById('filter-task').value;
  const tool   = document.getElementById('filter-tool').value;
  const source = document.getElementById('filter-source').value;
  const kw     = document.getElementById('search').value.trim().toLowerCase();
  return prompts.filter(p => {
    if (task   && p.task !== task) return false;
    if (tool   && !p.tools.includes(tool)) return false;
    if (source && p.source !== source) return false;
    if (kw && ![p.title, p.prompt, p.task, ...p.tools, p.source].join(' ').toLowerCase().includes(kw)) return false;
    return true;
  });
}

function populateFilter(id, values) {
  const sel = document.getElementById(id);
  [...new Set(values)].sort().forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  const res = await fetch('./prompts.json');
  prompts = await res.json();

  populateFilter('filter-task',   prompts.map(p => p.task));
  populateFilter('filter-tool',   prompts.flatMap(p => p.tools));
  populateFilter('filter-source', prompts.map(p => p.source));

  renderCards(prompts);

  ['filter-task','filter-tool','filter-source','search'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => renderCards(getFiltered()));
  });

  document.getElementById('card-grid').addEventListener('click', e => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    const p = prompts.find(x => x.id === id);
    if (!p) return;
    navigator.clipboard.writeText(p.prompt).then(() => {
      btn.textContent = 'コピーしました';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    });
  });
});
</script>
</body>
</html>
